# Local full-stack-ish dev: Postgres + the backend (built from its Dockerfile).
# The frontend is a static SPA, run it separately with `npm run dev` in /frontend.
#
# Usage:
#   1) cp backend/.env.example backend/.env   and fill in R2 / Google / Anthropic / email / JWT
#   2) docker compose up --build
# DATABASE_URL and PORT below override whatever is in backend/.env.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: warranty
      POSTGRES_PASSWORD: warranty
      POSTGRES_DB: warranty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warranty -d warranty"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://warranty:warranty@db:5432/warranty
      PORT: "5000"
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
